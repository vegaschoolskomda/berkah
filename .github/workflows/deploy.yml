name: Deploy to Server

on:
  push:
    branches:
      - main  # Cek apakah branch kamu 'main' atau 'master'. Sesuaikan ya!

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
      script: | 
      cd /var/www/berkah 
      git pull origin main 
      # Jika pakai Laravel, tambahkan: php artisan migrate --force # Jika pakai Node.js, tambahkan: npm install && pm2 restart app
